# sentinel_poc/pytest.ini
[pytest]
# Enforce strict marker registration to prevent typos in test decorators
addopts = 
    --strict-markers 
    --cov=sentinel 
    --cov-report=term-missing 
    --cov-report=html:output/coverage_html 
    --cov-fail-under=90
    -v

# Suppress external library warnings to maintain a clean CI console output
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# Define explicit execution markers
markers =
    unit: Atomic tests isolated from the database and external APIs.
    integration: Tests requiring the internal Docker network and Neo4j connection.
    e2e: End-to-end tests validating the full file ingestion and LLM execution pipeline.
    nlq: mark a test as requiring the Gemini Text-to-Cypher engine.
    dashboard: mark a test as validating executive analytics metrics.

# Specify the default test discovery directories
testpaths =
    tests
