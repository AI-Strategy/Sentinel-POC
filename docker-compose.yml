# sentinel_poc/docker-compose.yml
version: "3.9"

services:
  # ── Neo4j Graph Substrate (v2026 Stable) ────────────────────────────────────
  neo4j:
    image: neo4j:2026.01.4
    container_name: sentinel_graph
    restart: unless-stopped
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt Driver
    environment:
      - NEO4J_AUTH=neo4j/sentinel_neo4j
      - NEO4J_PLUGINS=["graph-data-science", "apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=gds.*,apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "sentinel_neo4j", "RETURN 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Sentinel API Orchestrator (v2.0) ────────────────────────────────────────
  api:
    build: backend/
    container_name: sentinel_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=sentinel_neo4j
      - DATABASE_URL=postgresql://sentinel:sentinel@postgres:5432/sentinel
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SENTINEL_AUTH_KEY=${SENTINEL_AUTH_KEY:-sentinel-secure-access-2025}
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./output:/app/output
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--ssl-keyfile", "key.pem", "--ssl-certfile", "cert.pem" ]
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
